name: Build macOS ARM Executable

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-14

    outputs:
      artifact_path: ${{ steps.prepare.outputs.artifact_path }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pyinstaller

      - name: Build executable (ARM64)
        run: |
          pyinstaller --onefile run.py

      - name: Generate version string
        id: version
        run: |
          VERSION="v$(date +'%Y.%m.%d-%H%M%S')"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Prepare artifact
        id: prepare
        run: |
          mkdir -p build_artifact
          cp dist/run build_artifact/run
          echo "artifact_path=build_artifact/run" >> $GITHUB_OUTPUT

      - name: Upload CI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bl_sbx-macos-arm64
          path: build_artifact/

  release:
    needs: build
    runs-on: macos-14

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: bl_sbx-macos-arm64
          path: .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.version }}
          name: Release ${{ needs.build.outputs.version }}
          files: run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
